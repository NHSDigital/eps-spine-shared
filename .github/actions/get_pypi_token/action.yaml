name: Get PyPI Token
description: Get PyPI token for trusted publishing

outputs:
  pypi-tkn:
    value: ${{ steps.get_pypi_token.outputs.api-tkn }}
    description: PyPI token for trusted publishing

runs:
  using: composite
  steps:
    - name: Get PyPI token
      id: get_pypi_token
      shell: bash
      run: |
        set -euo pipefail

        oidc_resp=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi")

        if ! oidc_tkn=$(jq -er '.value' <<< "${oidc_resp}"); then
          echo "Failed to retrieve OIDC token from GitHub. Response:"
          echo "${oidc_resp}" | jq .
          exit 1
        fi

        api_resp=$(curl -sSf -X POST "https://pypi.org/_/oidc/mint-token" \
          -H "Content-Type: application/json" \
          --data "{\"token\":\"${oidc_tkn}\"}")

        if ! api_tkn=$(jq -er '.token' <<< "${api_resp}"); then
          echo "Failed to exchange OIDC token for a PyPI API token. Response:"
          echo "${api_resp}" | jq .
          exit 1
        fi

        echo "api-tkn=${api_tkn}" >> "${GITHUB_OUTPUT}"
