name: Release

on:
  workflow_dispatch:

jobs:
  get_asdf_version:
    name: Get asdf Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get-asdf-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        name: Checkout source code

      - name: Get asdf version
        id: get-asdf-version
        uses: ./.github/actions/get_asdf_version

  quality_checks:
    name: Quality Checks
    needs: get_asdf_version
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks.yml@e208462679dedaded1e066c25c9830b9c0bf1930
    with:
      asdfVersion: ${{ needs.get_asdf_version.outputs.version }}
      reinstall_poetry: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  get_next_version:
    name: Get Next Version Number for Poetry
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release.yml@e208462679dedaded1e066c25c9830b9c0bf1930
    needs: [get_asdf_version, quality_checks]
    with:
      asdfVersion: ${{ needs.get_asdf_version.outputs.version }}
      branch_name: main
      dry_run: true

  build:
    name: Build Package and Upload as Artifact
    runs-on: ubuntu-22.04
    needs: [get_asdf_version, get_next_version]
    outputs:
      artifact_id: ${{ steps.upload-artifact.outputs.artifact-id }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/install_dependencies
        with:
          asdf_version: ${{ needs.get_asdf_version.outputs.version }}

      - name: Build package
        run: |
          poetry version "$NEXT_VERSION"
          make build
          cd dist
          zip -r eps_spine_shared.zip ./*
        env:
          NEXT_VERSION: ${{ needs.get_next_version.outputs.next_version_tag }}

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: packaged_code
          path: |
            dist/eps_spine_shared.zip

  pypi_token:
    name: Retrieve PyPI Token for Trusted Publishing
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      api-tkn: ${{ steps.retrieve-pypi-token.outputs.api-tkn }}
    steps:
      - name: Retrieve PyPI OIDC token
        id: retrieve-pypi-oidc-tkn
        run: |
          set -euo pipefail

          resp=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                  "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi")

          if ! oidc_tkn=$(jq -er '.value' <<< "${resp}"); then
              echo "Failed to retrieve OIDC token from GitHub. Response:"
              echo "${resp}" | jq .
              exit 1
          fi

          echo "::add-mask::${oidc_tkn}"
          echo "oidc-tkn=${oidc_tkn}" >> "${GITHUB_OUTPUT}"

      - name: Exchange PyPI OIDC token for API token
        id: retrieve-pypi-token
        run: |
          set -euo pipefail

          resp=$(curl -sSf -X POST "https://pypi.org/_/oidc/mint-token" \
                  -H "Content-Type: application/json" \
                  --data "{\"token\":\"${{ steps.retrieve-pypi-oidc-tkn.outputs.oidc-tkn }}\"}")

          if ! api_tkn=$(jq -er '.token' <<< "${resp}"); then
              echo "Failed to exchange OIDC token for a PyPI API token. Response:"
              echo "${resp}" | jq .
              exit 1
          fi

          echo "::add-mask::${api_tkn}"
          echo "api-tkn=${api_tkn}" >> "${GITHUB_OUTPUT}"

  tag_release:
    name: Tag Release
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release.yml@aea-5986-test-trusted-publishing
    needs: [build, get_asdf_version, pypi_token]
    with:
      asdfVersion: ${{ needs.get_asdf_version.outputs.version }}
      branch_name: main
      extra_artifact_name: eps_spine_shared.zip
      extra_artifact_id: ${{ needs.build.outputs.artifact_id }}
      extra_artifact_run_id: ${{ github.run_id }}
      extra_artifact_repository: ${{ github.repository }}
      dry_run: false
      pypi_publish: true
    secrets:
      PYPI_TOKEN: ${{ needs.pypi_token.outputs.api-tkn }}
    permissions:
      actions: write
      contents: write
      id-token: write
