name: Pull Request

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  pr_title_format_check:
    name: PR Title Format Check
    uses: NHSDigital/eps-common-workflows/.github/workflows/pr_title_check.yml@e208462679dedaded1e066c25c9830b9c0bf1930
    permissions:
      pull-requests: write

  get_asdf_version:
    name: Get asdf Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get_asdf_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        name: Checkout source code

      - name: Get asdf version
        id: get_asdf_version
        uses: ./.github/actions/get_asdf_version

  quality_checks:
    name: Quality Checks
    needs: get_asdf_version
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks.yml@e208462679dedaded1e066c25c9830b9c0bf1930
    with:
      asdfVersion: ${{ needs.get_asdf_version.outputs.version }}
      reinstall_poetry: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  tag_release:
    name: Tag Release (Dry Run)
    needs: get_asdf_version
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release.yml@aea-5986-test-trusted-publishing
    with:
      asdfVersion: ${{ needs.get_asdf_version.outputs.version }}
      branch_name: ${{ github.event.pull_request.head.ref }}
      dry_run: true
      pypi_publish: true
    permissions:
      id-token: write
      contents: write

  dependabot_auto_approve_and_merge:
    name: Dependabot Auto Approve and Merge
    needs: quality_checks
    uses: NHSDigital/eps-common-workflows/.github/workflows/dependabot-auto-approve-and-merge.yml@e208462679dedaded1e066c25c9830b9c0bf1930
    permissions:
      contents: write
      pull-requests: write
    secrets:
      AUTOMERGE_APP_ID: ${{ secrets.AUTOMERGE_APP_ID }}
      AUTOMERGE_PEM: ${{ secrets.AUTOMERGE_PEM }}

  pypi_token:
    name: Retrieve PyPI Token for Trusted Publishing
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - name: Retrieve PyPI OIDC token
        id: retrieve-pypi-oidc-tkn
        run: |
          set -euo pipefail

          resp=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                  "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi")

          if ! oidc_tkn=$(jq -er '.value' <<< "${resp}"); then
              echo "Failed to retrieve OIDC token from GitHub. Response:"
              echo "${resp}" | jq .
              exit 1
          fi

          echo "::add-mask::${oidc_tkn}"
          echo "oidc-tkn=${oidc_tkn}" >> "${GITHUB_OUTPUT}"

      - name: Exchange PyPI OIDC token for API token
        id: retrieve-pypi-token
        run: |
          set -euo pipefail

          resp=$(curl -sSf -X POST "https://pypi.org/_/oidc/mint-token" \
                  -H "Content-Type: application/json" \
                  --data "{\"token\":\"${{ steps.retrieve-pypi-oidc-tkn.outputs.oidc-tkn }}\"}")

          if ! api_tkn=$(jq -er '.token' <<< "${resp}"); then
              echo "Failed to exchange OIDC token for a PyPI API token. Response:"
              echo "${resp}" | jq .
              exit 1
          fi

          echo "::add-mask::${api_tkn}"
          echo "api-tkn=${api_tkn}" >> "${GITHUB_OUTPUT}"
